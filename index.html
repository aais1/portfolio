  f.title = 'mchatly chat widget';
  f.style.cssText = 'position:fixed;bottom:0;right:0;width:100px;height:100px;border:0;background:transparent;z-index:2147483647;';
  document.body.appendChild(f);
  window.addEventListener('message', function(e) {
    if (!e.data || typeof e.data.type !== 'string') return;
    if (e.data.type === 'mchatly:resize') {
      f.style.width = (e.data.width || 420) + 'px';
      f.style.height = (e.data.height || 640) + 'px';
    } else if (e.data.type === 'mchatly:close') {
      f.style.width = '100px';
      f.style.height = '100px';
    }
  });
})();
</script>
